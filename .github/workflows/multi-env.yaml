name: CI/CD Pipeline for Automated Multi-Environment Deployment Using GitHub Actions and Apache Tomcat

on: 
  push:
    branches: 
      - main
  workflow_dispatch: 

jobs:
  builds:
    runs-on: ubuntu-latest

    steps:
      - name: verify the code
        uses: actions/checkout@v4
      - name: install java 
        uses: actions/setup-java@v4
        with:
           distribution: temurin
           java-version: '17'

      -  name: maven validate
         run: mvn validate
      -  name: maven compile
         run: mvn compile
      -  name: maven test
         run: mvn test
      -  name: maven package 
         run: mvn package
      -  name: verify war file
         run: ls -lh ./target

      - name: Deploy to Development Environment
        run: |
              curl -v -u "${{ secrets.TOMCAT_USERNAME_DEV }}:${{ secrets.TOMCAT_PASSWORD_DEV }}" \
              -T target/TrainBook-0.0.1-SNAPSHOT.war \
              "http://${{ secrets.TOMCAT_HOST_DEV }}:8080/manager/text/deploy?path=/TrainBook&update=true"















         
         
