name: Ci-Cd Pipleine for Build and Deploy Tomcat 

on: 
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  builds:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: install java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      -  name: maven validate
         run: mvn validate
      -  name: maven compile
         run: mvn compile
      -  name: maven test
         run: mvn test
      -  name: maven package
         run: mvn package

      # scan the source code using sonarqube scan

      -  name: scan the code with sonar scan
         run: |
                 mvn clean verify sonar:sonar \
                 -Dsonar.projectKey=Train-Ticket-Reservation \
                 -Dsonar.host.url="${{ secrets.SONAR_HOST }}" \
                 -Dsonar.login="${{ secrets.SONAR_TOKEN }}" 
  
